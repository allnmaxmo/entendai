<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENTENDAI</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17202a;
      background: #f6f2ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(244, 181, 82, 0.18), transparent 34%),
        linear-gradient(315deg, rgba(32, 129, 118, 0.16), transparent 36%),
        #f6f2ea;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      color: #0f3d3e;
      font-size: clamp(2.5rem, 8vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 650px;
      margin: 14px 0 0;
      color: #4f5f5d;
      font-size: 1.12rem;
      line-height: 1.6;
    }

    .workspace {
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid #ddd1bd;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 18px 50px rgba(45, 36, 22, 0.10);
      padding: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #273734;
      font-size: 0.92rem;
      font-weight: 700;
    }

    select,
    textarea,
    button {
      width: 100%;
      font: inherit;
    }

    select,
    textarea {
      border: 1px solid #cdbfa8;
      border-radius: 8px;
      background: #fffdf8;
      color: #17202a;
      outline: none;
    }

    select {
      min-height: 48px;
      padding: 0 14px;
      cursor: pointer;
    }

    textarea {
      min-height: 168px;
      margin-top: 16px;
      padding: 15px;
      line-height: 1.55;
      resize: vertical;
    }

    select:focus,
    textarea:focus {
      border-color: #208176;
      box-shadow: 0 0 0 3px rgba(32, 129, 118, 0.18);
    }

    button {
      min-height: 52px;
      margin-top: 16px;
      border: 0;
      border-radius: 8px;
      background: #e66b2f;
      color: #fffaf1;
      font-weight: 800;
      cursor: pointer;
      transition: transform 150ms ease, background 150ms ease, opacity 150ms ease;
    }

    button:hover:not(:disabled) {
      background: #cf5d27;
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .status {
      min-height: 26px;
      margin-top: 14px;
      font-weight: 700;
    }

    #carregando {
      display: none;
      color: #208176;
    }

    #erro {
      color: #b42318;
    }

    #resposta {
      display: none;
      min-height: 92px;
      margin-top: 18px;
      border-left: 5px solid #208176;
      border-radius: 8px;
      background: #fffdf8;
      padding: 18px;
      color: #1f2e2b;
      font-size: 1.06rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 920px);
        padding: 28px 0;
      }

      .panel {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>ENTENDAI</h1>
      <p class="subtitle">Explique palavras, ideias e assuntos difíceis em português simples, no nível que fizer mais sentido para você.</p>
    </header>

    <section class="workspace panel" aria-label="Gerador de explicações">
      <div>
        <label for="modo">Modo da explicação</label>
        <select id="modo">
          <option value="criança">Modo Criança</option>
          <option value="iniciante" selected>Modo Iniciante</option>
          <option value="técnico">Modo Técnico</option>
          <option value="resumo">Modo Resumo</option>
          <option value="exemplo prático">Modo Exemplo prático</option>
        </select>
      </div>

      <div>
        <label for="termo">Texto para explicar</label>
        <textarea id="termo" placeholder="Exemplo: o que é computação em nuvem?"></textarea>
      </div>

      <button id="botao" type="button">Explicar</button>

      <div class="status">
        <div id="carregando">Carregando explicação...</div>
        <div id="erro" role="alert"></div>
      </div>

      <div id="resposta" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const termo = document.getElementById("termo");
    const modo = document.getElementById("modo");
    const botao = document.getElementById("botao");
    const carregando = document.getElementById("carregando");
    const erro = document.getElementById("erro");
    const resposta = document.getElementById("resposta");

    botao.addEventListener("click", async () => {
      const texto = termo.value.trim();

      erro.textContent = "";
      resposta.textContent = "";
      resposta.style.display = "none";

      if (!texto) {
        erro.textContent = "Digite algo para o ENTENDAI explicar.";
        termo.focus();
        return;
      }

      botao.disabled = true;
      carregando.style.display = "block";

      try {
        const retorno = await fetch("/api/explicar", {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({
            termo: texto,
            modo: modo.value
          })
        });

        const dados = await retorno.json();

        if (!retorno.ok) {
          throw new Error(dados.erro || "Não consegui gerar a explicação agora.");
        }

        resposta.textContent = dados.resposta;
        resposta.style.display = "block";
      } catch (error) {
        erro.textContent = error.message || "Algo saiu do esperado. Tente novamente em instantes.";
      } finally {
        carregando.style.display = "none";
        botao.disabled = false;
      }
    });
  </script>
</body>
</html>
